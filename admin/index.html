<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMAI Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
        .data-table th { background-color: #f8fafc; }
        .hidden { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #loader {
            position: fixed; top: 0; left: 0; w-full; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Loading Overlay -->
    <div id="loader" class="hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500"></div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900 border-l-4 border-blue-500 pl-3">Trang Quản Trị Hệ Thống CRM</h1>
            <div class="flex items-center space-x-2 text-sm text-gray-500">
                <i class="fas fa-server text-green-500"></i>
                <span>Database Sync Active</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-6 space-x-8">
            <button onclick="switchTab('products')" id="tab-products" class="tab-btn px-1 py-4 text-gray-500 hover:text-gray-700 active">📦 Sản Phẩm</button>
            <button onclick="switchTab('customers')" id="tab-customers" class="tab-btn px-1 py-4 text-gray-500 hover:text-gray-700">👥 Khách Hàng</button>
            <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn px-1 py-4 text-gray-500 hover:text-gray-700">🛒 Đơn Hàng</button>
        </div>

        <!-- Section: Products -->
        <div id="section-products" class="tab-section bg-white rounded-lg shadow p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Danh Sách Sản Phẩm</h2>
                <button onclick="openModal('products')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition shadow"><i class="fas fa-plus mr-2"></i>Thêm Sản Phẩm</button>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table min-w-full divide-y divide-gray-200 text-sm">
                    <thead><tr><th class="px-4 py-3 text-left font-medium text-gray-500">STT</th><th class="px-4 py-3 text-left font-medium text-gray-500">Tên Sản Phẩm</th><th class="px-4 py-3 text-left font-medium text-gray-500">Giá (VNĐ)</th><th class="px-4 py-3 text-left font-medium text-gray-500">Mô tả</th><th class="px-4 py-3 text-left font-medium text-gray-500">Tồn kho</th><th class="px-4 py-3 text-right font-medium text-gray-500">Thao tác</th></tr></thead>
                    <tbody id="tbody-products" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

        <!-- Section: Customers -->
        <div id="section-customers" class="tab-section hidden bg-white rounded-lg shadow p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Danh sách Khách Hàng</h2>
                <button onclick="openModal('customers')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition shadow"><i class="fas fa-plus mr-2"></i>Thêm Khách Hàng</button>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table min-w-full divide-y divide-gray-200 text-sm">
                    <thead><tr><th class="px-4 py-3 text-left font-medium text-gray-500">STT</th><th class="px-4 py-3 text-left font-medium text-gray-500">Thời gian</th><th class="px-4 py-3 text-left font-medium text-gray-500">Họ Tên</th><th class="px-4 py-3 text-left font-medium text-gray-500">Liên hệ</th><th class="px-4 py-3 text-left font-medium text-gray-500">Địa chỉ</th><th class="px-4 py-3 text-left font-medium text-gray-500">Size / SP / Giá</th><th class="px-4 py-3 text-right font-medium text-gray-500">Thao tác</th></tr></thead>
                    <tbody id="tbody-customers" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

        <!-- Section: Orders -->
        <div id="section-orders" class="tab-section hidden bg-white rounded-lg shadow p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Biên Lai & Đơn Hàng</h2>
                <button onclick="openOrderModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition shadow"><i class="fas fa-plus mr-2"></i>Tạo Đơn Hàng Mới</button>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table min-w-full divide-y divide-gray-200 text-sm">
                    <thead><tr><th class="px-4 py-3 text-left font-medium text-gray-500">STT</th><th class="px-4 py-3 text-left font-medium text-gray-500">Ngày mua</th><th class="px-4 py-3 text-left font-medium text-gray-500">Khách hàng</th><th class="px-4 py-3 text-left font-medium text-gray-500">Sản phẩm</th><th class="px-4 py-3 text-left font-medium text-gray-500">Số tiền (VNĐ)</th><th class="px-4 py-3 text-left font-medium text-gray-500">Trạng thái</th><th class="px-4 py-3 text-left font-medium text-gray-500">Mã GD</th><th class="px-4 py-3 text-right font-medium text-gray-500">Thao tác</th></tr></thead>
                    <tbody id="tbody-orders" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Generic Modal -->
    <div id="genericModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 flex justify-center items-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <form id="genericForm" onsubmit="handleFormSubmit(event)">
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                    <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Tiêu đề</h3>
                    <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-500"><i class="fas fa-times"></i></button>
                </div>
                <div id="modalBody" class="px-6 py-4 space-y-4 max-h-[60vh] overflow-y-auto">
                    <!-- Inputs generated dynamically -->
                </div>
                <div class="px-6 py-4 border-t border-gray-200 flex justify-end space-x-3 bg-gray-50">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 bg-white hover:bg-gray-50 text-sm">Hủy</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm shadow">Lưu Dữ Liệu</button>
                </div>
                <!-- Hidden fields API -->
                <input type="hidden" id="modalSheet" value="">
                <input type="hidden" id="modalAction" value="">
                <input type="hidden" id="modalRow" value="">
            </form>
        </div>
    </div>


    <script>
        // APP CONFIGURL
        const APPS_SCRIPT_URL = 'http://localhost:3000/api/admin';
        
        let allData = {
            products: [], customers: [], orders: []
        };
        let currentTab = 'products';

        // -------------------------
        // INITIALIZATION
        // -------------------------
        window.addEventListener('DOMContentLoaded', () => {
            fetchAllData();
        });

        // -------------------------
        // UI INTERACTIONS
        // -------------------------
        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+tabId).classList.add('active');
            
            document.querySelectorAll('.tab-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-'+tabId).classList.remove('hidden');
        }

        function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

        // -------------------------
        // FETCH DATA
        // -------------------------
        async function fetchAllData() {
            showLoader();
            try {
                // Fetch in parallel for speed
                const p = fetch(`${APPS_SCRIPT_URL}?action=getRows&sheet=products`).then(r => r.json());
                const c = fetch(`${APPS_SCRIPT_URL}?action=getRows&sheet=customers`).then(r => r.json());
                const o = fetch(`${APPS_SCRIPT_URL}?action=getRows&sheet=orders`).then(r => r.json());
                
                const [resP, resC, resO] = await Promise.all([p, c, o]);
                
                if (resP && resP.success) allData.products = resP.data;
                if (resC && resC.success) allData.customers = resC.data;
                if (resO && resO.success) allData.orders = resO.data;

                renderTables();
            } catch (err) {
                console.error(err);
                Swal.fire('Lỗi Tải Dữ Liệu', 'Không thể kết nối được tới Database. Vui lòng kiểm tra lại cấu hình.', 'error');
            }
            hideLoader();
        }

        function renderTables() {
            // Products
            const tP = document.getElementById('tbody-products');
            tP.innerHTML = allData.products.map(item => `
                <tr class="hover:bg-blue-50">
                    <td class="px-4 py-2 font-medium text-gray-500">${item.row}</td>
                    <td class="px-4 py-2 font-bold text-gray-800">${item.cols[0]}</td>
                    <td class="px-4 py-2 text-green-600 font-semibold">${formatMoney(item.cols[1])}</td>
                    <td class="px-4 py-2 text-gray-500 truncate max-w-xs">${item.cols[2]}</td>
                    <td class="px-4 py-2"><span class="bg-${item.cols[3] > 0 ? 'blue':'red'}-100 text-${item.cols[3] > 0 ? 'blue':'red'}-800 px-2 py-1 rounded-full text-xs font-bold">${item.cols[3]}</span></td>
                    <td class="px-4 py-2 text-right">
                        <button onclick="editModal('products', ${item.row})" class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('products', ${item.row})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');

            // Customers
            const tC = document.getElementById('tbody-customers');
            tC.innerHTML = allData.customers.map(item => {
                const d = item.data || {};
                return `
                <tr class="hover:bg-blue-50">
                    <td class="px-4 py-2 font-medium text-gray-500">${item.row}</td>
                    <td class="px-4 py-2 text-gray-500 text-xs">${d.registration_date || ''}</td>
                    <td class="px-4 py-2 font-bold text-gray-800">${d.name || ''}</td>
                    <td class="px-4 py-2 text-gray-600">
                        <div><i class="fas fa-phone text-xs mr-1 text-gray-400"></i>${d.phone || ''}</div>
                        ${d.email ? `<div class="text-xs text-gray-400 mt-1"><i class="fas fa-envelope mr-1"></i>${d.email}</div>` : ''}
                    </td>
                    <td class="px-4 py-2 text-gray-500 truncate max-w-xs">${d.address || ''}</td>
                    <td class="px-4 py-2 text-gray-600 text-xs">${d.size ? 'S:'+d.size : ''} ${d.product ? '| '+d.product : ''} ${d.amount ? '| '+formatMoney(d.amount) : ''}</td>
                    <td class="px-4 py-2 text-right">
                        <button onclick="editModal('customers', ${item.row})" class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('customers', ${item.row})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');

            // Orders
            const tO = document.getElementById('tbody-orders');
            tO.innerHTML = allData.orders.map(item => {
                const d = item.data || {};
                const statusClass = (d.status === 'Đã Thanh Toán' || d.status === 'success')
                    ? 'bg-green-100 text-green-700'
                    : 'bg-yellow-100 text-yellow-700';
                return `
                <tr class="hover:bg-blue-50">
                    <td class="px-4 py-2 font-medium text-gray-500">${item.row}</td>
                    <td class="px-4 py-2 text-gray-500 text-xs">${d.purchase_date || ''}</td>
                    <td class="px-4 py-2">
                        <div class="font-bold text-gray-800">${d.customer_name || ''}</div>
                        <div class="text-xs text-gray-500 flex flex-col mt-1">
                            ${d.phone ? `<span><i class="fas fa-phone mr-1"></i>${d.phone}</span>` : ''}
                            ${d.email ? `<span><i class="fas fa-envelope mr-1"></i>${d.email}</span>` : ''}
                        </div>
                    </td>
                    <td class="px-4 py-2 text-purple-600 font-semibold">${d.product || ''}</td>
                    <td class="px-4 py-2 font-bold text-gray-900">${formatMoney(d.amount)}</td>
                    <td class="px-4 py-2"><span class="px-2 py-1 rounded-md text-xs font-bold ${statusClass}">${d.status || ''}</span></td>
                    <td class="px-4 py-2 text-gray-500 text-xs">${d.order_code || ''}</td>
                    <td class="px-4 py-2 text-right">
                        <button onclick="editModal('orders', ${item.row})" class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('orders', ${item.row})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function formatMoney(amount) {
            if(!amount) return '';
            let n = String(amount).replace(/\D/g, '');
            if(!n) return amount;
            return parseInt(n).toLocaleString('vi-VN') + " đ";
        }

        // -------------------------
        // FORMS & MODALS (Add/Edit)
        // -------------------------
        const config = {
            products: { title: "Sản phẩm", fields: ["Tên Sản Phẩm", "Giá (VNĐ)", "Mô tả", "Tồn kho"] },
            customers: { title: "Khách hàng", fields: ["Thời gian", "Họ Tên", "Số điện thoại", "Email", "Địa chỉ", "Size", "Sản phẩm", "Giá tiền"] },
            orders: { title: "Đơn hàng", fields: ["Ngày mua", "Khách hàng", "Số điện thoại", "Email", "Sản phẩm", "Số tiền (VNĐ)", "Trạng thái", "Mã GD"] }
        };

        function openModal(sheet, existingData = null, rowNum = null) {
            document.getElementById('modalTitle').innerText = existingData ? `Chỉnh sửa ${config[sheet].title}` : `Thêm mới ${config[sheet].title}`;
            document.getElementById('modalAction').value = existingData ? 'update' : 'create';
            document.getElementById('modalSheet').value = sheet;
            document.getElementById('modalRow').value = rowNum || '';
            
            let html = '';
            const fields = config[sheet].fields;
            
            fields.forEach((f, idx) => {
                let val = existingData ? existingData[idx] : '';
                // Default date for Create
                if (!existingData && (f === "Thời gian" || f === "Ngày mua")) {
                    val = new Date().toLocaleString();
                }
                
                html += `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">${f}</label>
                    <input type="text" id="input_${idx}" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" value="${val}" required>
                </div>`;
            });
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('genericModal').classList.remove('hidden');
        }

        function openOrderModal() {
            // SPECIAL MODAL FOR ORDER TO DEDUCT INVENTORY AUTO CALC
            document.getElementById('modalTitle').innerText = "Thêm Đơn Hàng Mới";
            document.getElementById('modalAction').value = "create";
            document.getElementById('modalSheet').value = "orders";
            document.getElementById('modalRow').value = "";
            
            let productOptions = '<option value="">-- Chọn sản phẩm --</option>';
            // only show products with stock > 0
            allData.products.forEach(p => {
                let stock = parseInt(p.cols[3]) || 0;
                if(stock > 0) {
                    productOptions += `<option value="${p.cols[0]}" data-price="${p.cols[1]}">${p.cols[0]} (Còn: ${stock} - Giá: ${formatMoney(p.cols[1])})</option>`;
                }
            });

            let html = `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ngày mua</label>
                    <input type="text" id="input_0" class="w-full border border-gray-300 rounded-px-3 py-2 text-sm bg-gray-100" value="${new Date().toLocaleString()}" readonly>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên khách hàng / SĐT</label>
                    <input type="text" id="input_1" class="w-full border border-gray-300 rounded px-3 py-2 text-sm" placeholder="Nhập tên KH" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sản phẩm</label>
                    <select id="input_2" class="w-full border border-gray-300 rounded px-3 py-2 text-sm" required onchange="calcOrderPrice(this)">
                        ${productOptions}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Số lượng</label>
                    <input type="number" id="order_qty" value="1" min="1" class="w-full border border-gray-300 rounded px-3 py-2 text-sm" onchange="calcOrderPrice(document.getElementById('input_2'))">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tổng Số Tiền Cần Thu (VNĐ)</label>
                    <input type="text" id="input_3" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-bold text-red-600 bg-red-50" required readonly>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trạng thái</label>
                    <select id="input_4" class="w-full border border-gray-300 rounded px-3 py-2 text-sm" required>
                        <option value="Đã Thanh Toán">Đã Thanh Toán (SePay)</option>
                        <option selected value="Chờ Thanh Toán">Chờ Thanh Toán / COD</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mã GD (Mã ĐH)</label>
                    <input type="text" id="input_5" class="w-full border border-gray-300 rounded px-3 py-2 text-sm" value="MANUAL_${Math.floor(Math.random()*10000)}">
                </div>
            `;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('genericModal').classList.remove('hidden');
        }

        function calcOrderPrice(selectEl) {
            if(selectEl.selectedIndex <= 0) return;
            const priceStr = selectEl.options[selectEl.selectedIndex].getAttribute('data-price');
            const price = parseInt(String(priceStr).replace(/\D/g, '')) || 0;
            const qty = parseInt(document.getElementById('order_qty').value) || 1;
            const total = price * qty;
            document.getElementById('input_3').value = total;
        }

        function closeModal() {
            document.getElementById('genericModal').classList.add('hidden');
        }

        function editModal(sheet, rowNum) {
            const rowData = allData[sheet].find(i => i.row === rowNum).cols;
            openModal(sheet, rowData, rowNum);
        }

        // -------------------------
        // CRUD ACTIONS POST TO GAS
        // -------------------------
        async function handleFormSubmit(e) {
            e.preventDefault();
            const action = document.getElementById('modalAction').value;
            const sheet = document.getElementById('modalSheet').value;
            const rowNum = document.getElementById('modalRow').value;
            
            const fieldsCount = config[sheet].fields.length;
            let dataArr = [];
            for(let i=0; i<fieldsCount; i++) {
                let el = document.getElementById('input_'+i);
                dataArr.push(el ? el.value : '');
            }

            const payload = { action: action, sheet: sheet, row: rowNum, data: dataArr };
            
            console.log("Submitting payload:", payload);
            
            closeModal();
            showLoader();
            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // Avoid CORS Preflight Issues
                    body: JSON.stringify(payload)
                }).then(r => r.json());

                if(res.success) {
                    Swal.fire('Thành công!', res.message, 'success');
                    fetchAllData(); // reload
                } else {
                    Swal.fire('Lỗi', res.error, 'error');
                }
            } catch(e) {
                Swal.fire('Thất bại', 'Vui lòng kiểm tra lại kết nối hoặc Console Tab', 'error');
            }
            hideLoader();
        }

        function deleteRow(sheet, rowNum) {
            Swal.fire({
                title: 'Bạn có chắc chắn muốn xóa?',
                text: "Dữ liệu sẽ bị xóa VĨNH VIỄN khỏi Cơ sở dữ liệu và không thể khôi phục!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Đồng ý, Xóa ngay!',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    showLoader();
                    const payload = { action: 'delete', sheet: sheet, row: rowNum };
                    fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    }).then(r => r.json()).then(res => {
                        if(res.success) {
                            Swal.fire('Đã xóa!', res.message, 'success');
                            fetchAllData();
                        } else {
                            Swal.fire('Lỗi', res.error, 'error');
                            hideLoader();
                        }
                    }).catch(err => {
                        Swal.fire('Lỗi', 'Xóa thất bại', 'error');
                        hideLoader();
                    });
                }
            });
        }
    </script>
</body>
</html>
