    <style>
        :root {
            --bg-primary: #FAF7F2; 
            --text-primary: #2C2A29; 
            --accent: #C89F82; 
            --border: #E8E0D5;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Lora', serif;
            color: var(--accent);
            margin-top: 30px;
            margin-bottom: 15px;
        }
        h1 { font-size: 2.2rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        h2 { font-size: 1.8rem; }
        h3 { font-size: 1.5rem; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { background: #fff; padding: 2px 5px; border-radius: 4px; font-family: monospace; border: 1px solid var(--border); }
        pre { background: #fff; padding: 15px; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); }
        blockquote { border-left: 4px solid var(--accent); padding-left: 15px; margin-left: 0; font-style: italic; color: #555; }
        ul, ol { margin-bottom: 20px; padding-left: 20px; }
        li { margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #fff; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: var(--bg-primary); color: var(--accent); }
        .back-nav { margin-bottom: 30px; }
        .back-nav a { display: inline-block; padding: 8px 15px; border: 1px solid var(--accent); border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
